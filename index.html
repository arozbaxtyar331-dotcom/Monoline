<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monoline - Bahast Hassan</title>
    <style>
        :root {
            --green-900: #071b12;
            --green-800: #0d2b1c;
            --green-700: #11412b;
            --green-500: #2f7a4d;
            --green-300: #8fc79b;
            --gold-500: #d7b24c;
            --gold-300: #ecd88d;
            --text: #f4f7f1;
            --muted: rgba(244, 247, 241, 0.72);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(215, 178, 76, 0.16), transparent 28%),
                radial-gradient(circle at 82% 18%, rgba(143, 199, 155, 0.18), transparent 24%),
                radial-gradient(circle at 20% 85%, rgba(215, 178, 76, 0.12), transparent 20%),
                linear-gradient(135deg, #04110b 0%, var(--green-900) 38%, var(--green-800) 100%);
            font-family: Georgia, 'Times New Roman', serif;
            overflow: hidden;
            position: relative;
        }

        body::before,
        body::after {
            content: '';
            position: fixed;
            pointer-events: none;
        }

        body::before {
            top: -10rem;
            right: -8rem;
            width: 26rem;
            height: 26rem;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(236, 216, 141, 0.18), transparent 68%);
            filter: blur(6px);
        }

        body::after {
            bottom: -12rem;
            left: -10rem;
            width: 30rem;
            height: 30rem;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(47, 122, 77, 0.2), transparent 70%);
            filter: blur(10px);
        }

        .container {
            width: min(720px, 100%);
            padding: 3rem;
            border-radius: 30px;
            background: linear-gradient(180deg, rgba(10, 32, 20, 0.88), rgba(6, 20, 13, 0.94));
            border: 1px solid rgba(236, 216, 141, 0.22);
            box-shadow:
                0 30px 80px rgba(0, 0, 0, 0.48),
                inset 0 1px 0 rgba(255, 255, 255, 0.08),
                0 0 0 1px rgba(143, 199, 155, 0.08);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(18px);
        }

        .container::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                linear-gradient(135deg, rgba(215, 178, 76, 0.12), transparent 28%),
                linear-gradient(315deg, rgba(143, 199, 155, 0.1), transparent 26%);
            pointer-events: none;
        }

        .container::after {
            content: '';
            position: absolute;
            inset: 1rem;
            border-radius: 22px;
            border: 1px solid rgba(236, 216, 141, 0.12);
            pointer-events: none;
        }

        .header {
            text-align: center;
            padding-bottom: 2rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(236, 216, 141, 0.16);
            position: relative;
            z-index: 1;
        }

        .monoline {
            font-size: clamp(3.2rem, 8vw, 5.6rem);
            font-weight: 700;
            letter-spacing: 0.1em;
            line-height: 1;
            text-transform: uppercase;
            color: transparent;
            background: linear-gradient(135deg, var(--gold-300) 0%, var(--text) 22%, var(--green-300) 48%, var(--gold-500) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            text-shadow: 0 0 28px rgba(236, 216, 141, 0.18);
        }

        .brand-subtitle {
            margin-top: 0.45rem;
            color: var(--gold-300);
            font: 600 0.82rem/1.3 Arial, Helvetica, sans-serif;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            text-align: left;
        }

        .founder {
            margin-top: 0.65rem;
            color: var(--muted);
            font: 600 clamp(0.95rem, 2.2vw, 1.15rem)/1.5 Arial, Helvetica, sans-serif;
            letter-spacing: 0.22em;
            text-transform: uppercase;
        }

        .name {
            margin-top: 0.8rem;
            color: var(--text);
            font-size: clamp(1.55rem, 4vw, 2.2rem);
            font-weight: 700;
            letter-spacing: 0.08em;
        }

        .links-list {
            list-style: none;
            display: grid;
            gap: 1rem;
            position: relative;
            z-index: 1;
        }

        .link-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1.2rem 1.3rem;
            border-radius: 18px;
            text-decoration: none;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.03));
            border: 1px solid rgba(236, 216, 141, 0.14);
            color: var(--text);
            transition: transform 0.28s ease, border-color 0.28s ease, box-shadow 0.28s ease, background 0.28s ease;
            box-shadow: 0 18px 36px rgba(0, 0, 0, 0.2);
        }

        .link-item:hover {
            transform: translateY(-4px);
            border-color: rgba(236, 216, 141, 0.34);
            background: linear-gradient(180deg, rgba(236, 216, 141, 0.11), rgba(47, 122, 77, 0.08));
            box-shadow: 0 24px 50px rgba(0, 0, 0, 0.28);
        }

        .badge {
            width: 3.25rem;
            height: 3.25rem;
            flex: 0 0 auto;
            border-radius: 14px;
            display: grid;
            place-items: center;
            border: 1px solid rgba(236, 216, 141, 0.24);
            background: linear-gradient(135deg, rgba(236, 216, 141, 0.18), rgba(47, 122, 77, 0.2));
            color: var(--gold-300);
            font: 700 0.95rem/1 Arial, Helvetica, sans-serif;
            letter-spacing: 0.12em;
        }

        .link-text {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .link-title {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .link-subtitle {
            color: var(--muted);
            font: 500 0.88rem/1.4 Arial, Helvetica, sans-serif;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .footer {
            margin-top: 2rem;
            text-align: center;
            color: rgba(244, 247, 241, 0.66);
            font: 600 0.85rem/1.4 Arial, Helvetica, sans-serif;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            position: relative;
            z-index: 1;
        }

        @media (max-width: 640px) {
            body {
                padding: 1rem;
            }

            .container {
                padding: 1.6rem;
                border-radius: 24px;
            }

            .header {
                padding-bottom: 1.4rem;
                margin-bottom: 1.4rem;
            }

            .link-item {
                padding: 1rem;
            }

            .badge {
                width: 3rem;
                height: 3rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="monoline">Monoline</div>
            <div class="brand-subtitle">Printing Services</div>
            <div class="founder">Founder & Director</div>
            <div class="name">Bahast Hassan</div>
        </div>
        
        <ul class="links-list">
            <li>
                <a href="https://www.instagram.com/bahast.hassan?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" class="link-item instagram" target="_blank">
                    <span class="badge">IG</span>
                    <span class="link-text">
                        <span class="link-title">Instagram</span>
                    </span>
                </a>
            </li>
            <li>
                <a href="https://wa.me/9647701535292" class="link-item whatsapp" target="_blank">
                    <span class="badge">WA</span>
                    <span class="link-text">
                        <span class="link-title">WhatsApp</span>
                    </span>
                </a>
            </li>
            <li>
                <a href="https://t.me/+9647701535292" class="link-item telegram" target="_blank">
                    <span class="badge">TG</span>
                    <span class="link-text">
                        <span class="link-title">Telegram</span>
                    </span>
                </a>
            </li>
        </ul>

        <div class="footer">EST 2026</div>
    </div>
</body>
</html>
